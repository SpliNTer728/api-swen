name: Laravel CI/CD
on: [push]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with: { php-version: "8.2" }
      - run: composer install
      - run: cp .env.example .env && php artisan key:generate
      - run: php artisan test
